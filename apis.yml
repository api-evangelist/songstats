apis:
  - aid: songstats:songstats-enterprise-api
    name: Songstats Enterprise API
    description: >-
      The Songstats Enterprise API (v1) provides music data analytics for artists,
      tracks, labels, and collaborators. Endpoints return JSON data including current
      stats, historic stats, audience details, catalog information, activities, top
      playlists, top tracks, and geographic location data across major streaming
      platforms. Authentication uses an API key in the request header. Includes
      Radiostats integration for radio airplay data.
    humanURL: https://docs.songstats.com/
    baseURL: https://api.songstats.com/enterprise/v1
    tags:
      - Analytics
