aid: songstats
name: Songstats
description: >-
  Songstats provides music data analytics through its Enterprise API, enabling
  music industry professionals to access streaming statistics, audience data,
  chart positions, playlist placements, and catalog information for artists, tracks,
  record labels, and collaborators across all major streaming platforms including
  Spotify, Apple Music, Amazon Music, Deezer, TikTok, and more. Integrated with
  Radiostats for radio airplay data across 40,000+ stations.
type: Index
position: Consumer
