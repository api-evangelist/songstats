        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: get-artist-catalog
        description: Get full track catalog for an artist
        call: songstats.get-artist-catalog
        with:
          songstats_artist_id: rest.songstats_artist_id
        outputParameters:
        - type: object
