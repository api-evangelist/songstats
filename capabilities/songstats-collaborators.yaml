        destructive: false
        idempotent: true
      call: songstats-collaborators.getcollaboratorinfo
      with:
        songstats_collaborator_id: tools.songstats_collaborator_id
      outputParameters:
      - type: object
        mapping: $.
    - name: search-collaborators
      description: Search Collaborators
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: songstats-collaborators.searchcollaborators
      with:
        q: tools.q
      outputParameters:
      - type: object
        mapping: $.
    - name: get-collaborator-current-stats
      description: Get Collaborator Current Stats
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: songstats-collaborators.getcollaboratorcurrentstats
      with:
        songstats_collaborator_id: tools.songstats_collaborator_id
        source: tools.source
      outputParameters:
      - type: object
        mapping: $.
    - name: get-collaborator-top-tracks
      description: Get Collaborator Top Tracks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: songstats-collaborators.getcollaboratortoptracks
      with:
        songstats_collaborator_id: tools.songstats_collaborator_id
        source: tools.source
      outputParameters:
      - type: object
        mapping: $.
