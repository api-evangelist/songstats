          required: true
        - name: source
          in: query
          type: string
          description: Streaming platform source filter
    - name: labels-track_request
      path: /labels/track_request
      operations:
      - name: addlabeltrackrequest
        method: POST
        description: Add Label Track Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
