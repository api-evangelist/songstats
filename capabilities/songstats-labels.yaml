          in: query
          type: string
          required: true
        - name: link
          in: query
          type: string
          required: true
    - name: labels-search
      path: /labels/search
      operations:
      - name: searchlabels
        method: GET
        description: Search Labels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: Search query
          required: true
    - name: labels-stats
