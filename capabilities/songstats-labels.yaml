      - name: getlabelhistoricstats
        method: GET
        description: Get Label Historic Stats
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: songstats_label_id
          in: query
          type: string
          description: Songstats label ID
          required: true
        - name: source
          in: query
          type: string
          description: Streaming platform source filter
        - name: start_date
          in: query
          type: string
          description: Start date
        - name: end_date
          in: query
          type: string
          description: End date
    - name: labels-info
      path: /labels/info
      operations:
      - name: getlabelinfo
        method: GET
        description: Get Label Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: songstats_label_id
          in: query
          type: string
          description: Songstats label ID
        - name: label_name
          in: query
          type: string
          description: Label name search
    - name: labels-link_request
      path: /labels/link_request
      operations:
      - name: addlabellinkrequest
        method: POST
        description: Add Label Link Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removelabellinkrequest
        method: DELETE
        description: Remove Label Link Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
