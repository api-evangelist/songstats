      call: songstats-tracks.removetracklinkrequest
      with:
        songstats_track_id: tools.songstats_track_id
        link: tools.link
      outputParameters:
      - type: object
        mapping: $.
    - name: get-track-locations
      description: Get Track Locations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: songstats-tracks.gettracklocations
      with:
        songstats_track_id: tools.songstats_track_id
        source: tools.source
