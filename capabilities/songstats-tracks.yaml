naftiko: 1.0.0-alpha2
info:
  label: Songstats Enterprise API — Tracks
  description: 'Songstats Enterprise API — Tracks. 8 operations. Lead operation: Get Track Activities. Self-contained Naftiko
    capability covering one Songstats business surface.'
  tags:
  - Songstats
  - Tracks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SONGSTATS_API_KEY: SONGSTATS_API_KEY
capability:
  consumes:
  - type: http
    namespace: songstats-tracks
    baseUri: https://api.songstats.com/enterprise/v1
    description: Songstats Enterprise API — Tracks business capability. Self-contained, no shared references.
    resources:
    - name: tracks-activities
      path: /tracks/activities
      operations:
      - name: gettrackactivities
        method: GET
        description: Get Track Activities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: songstats_track_id
          in: query
          type: string
          description: Songstats track ID
          required: true
    - name: tracks-historic_stats
      path: /tracks/historic_stats
      operations:
      - name: gettrackhistoricstats
        method: GET
        description: Get Track Historic Stats
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: songstats_track_id
          in: query
          type: string
          description: Songstats track ID
          required: true
        - name: source
          in: query
          type: string
          description: Streaming platform source filter
        - name: start_date
          in: query
          type: string
          description: Start date for historical data
        - name: end_date
          in: query
          type: string
          description: End date for historical data
    - name: tracks-info
      path: /tracks/info
      operations:
      - name: gettrackinfo
        method: GET
        description: Get Track Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: songstats_track_id
          in: query
          type: string
          description: Songstats track ID
        - name: isrc
          in: query
          type: string
          description: International Standard Recording Code
        - name: spotify_track_id
          in: query
          type: string
          description: Spotify track ID
    - name: tracks-link_request
      path: /tracks/link_request
      operations:
      - name: addtracklinkrequest
        method: POST
        description: Add Track Link Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removetracklinkrequest
        method: DELETE
        description: Remove Track Link Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: songstats_track_id
          in: query
          type: string
          required: true
        - name: link
          in: query
          type: string
          required: true
    - name: tracks-locations
      path: /tracks/locations
      operations:
      - name: gettracklocations
        method: GET
        description: Get Track Locations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: songstats_track_id
          in: query
          type: string
          description: Songstats track ID
          required: true
        - name: source
          in: query
          type: string
          description: Streaming platform source filter
    - name: tracks-search
      path: /tracks/search
      operations:
      - name: searchtracks
        method: GET
        description: Search Tracks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: Search query
          required: true
    - name: tracks-stats
      path: /tracks/stats
      operations:
      - name: gettrackcurrentstats
        method: GET
        description: Get Track Current Stats
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: songstats_track_id
          in: query
          type: string
          description: Songstats track ID
          required: true
        - name: source
          in: query
          type: string
          description: Streaming platform source filter
    authentication:
      type: apikey
      key: apikey
      value: '{{env.SONGSTATS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: songstats-tracks-rest
    port: 8080
    description: REST adapter for Songstats Enterprise API — Tracks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tracks/activities
      name: tracks-activities
      description: REST surface for tracks-activities.
      operations:
      - method: GET
        name: gettrackactivities
        description: Get Track Activities
        call: songstats-tracks.gettrackactivities
        with:
          songstats_track_id: rest.songstats_track_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tracks/historic-stats
      name: tracks-historic-stats
      description: REST surface for tracks-historic_stats.
      operations:
      - method: GET
        name: gettrackhistoricstats
        description: Get Track Historic Stats
        call: songstats-tracks.gettrackhistoricstats
